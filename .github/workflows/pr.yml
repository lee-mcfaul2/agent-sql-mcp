name: PR validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: |
          mkdir -p cmd/sql-mcp/embedded
          cp schemas/*.json cmd/sql-mcp/embedded/
      - run: go test ./internal/... ./cmd/...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - uses: golangci/golangci-lint-action@v6
        with: { version: v1.61 }

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: |
          mkdir -p cmd/sql-mcp/embedded
          cp schemas/*.json cmd/sql-mcp/embedded/
      - run: go test -tags=integration ./tests/integration/... ./tests/conformance/...

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/
