services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ag
      POSTGRES_PASSWORD: ag
      POSTGRES_DB: ag
    ports: ["127.0.0.1:5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ag"]
      interval: 2s
      retries: 10

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://ag:ag@postgres:5432/ag?sslmode=disable"
      - "up"

  sql-mcp:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      SQLMCP_LISTEN_ADDR: ":8443"
      SQLMCP_OIDC_ISSUER: "http://idp:8080/realms/ag"
      SQLMCP_OIDC_AUDIENCE: "agent-sql-mcp"
      SQLMCP_GATEWAY_SPIFFE: "spiffe://ai-security.io/ns/gateway/sa/agent-gateway-sa"
      SQLMCP_DATABASE_URL: "postgres://ag:ag@postgres:5432/ag?sslmode=disable"
      SQLMCP_LOG_LEVEL: "debug"
    ports: ["8443:8443"]
